<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- New Relic Browser agent — deferred so it doesn't block first paint -->
    <script defer src="/newrelic.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chord" />

    <!-- Private tool: block search engines and rich-link previews. -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow" />

    <title>Chord</title>

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    />
  </head>
