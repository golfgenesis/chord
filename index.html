<!doctype html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- New Relic Browser agent — deferred so it doesn't block first paint -->
    <script defer src="/newrelic.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chord" />

    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- seo:start — the /song/* edge function (functions/song/[[path]].js) swaps
         everything between these two markers for per-song tags. The defaults below
         are the HOMEPAGE's tags. Keep the markers byte-exact or the swap no-ops. -->
    <title>คอร์ดเพลง ค้นหาคอร์ดกีตาร์ อูคูเลเล่ ฟรี | Chord</title>
    <meta name="description" content="ค้นหาคอร์ดเพลงไทยและสากลกว่า 70,000 เพลง พร้อมเนื้อร้อง เปลี่ยนคีย์ (transpose) ได้ทันที เล่นพร้อมวงแบบเรียลไทม์ ใช้ฟรี ไม่ต้องสมัคร" />
    <link rel="canonical" href="https://chord.golfchairat.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chord" />
    <meta property="og:title" content="คอร์ดเพลง ค้นหาคอร์ดกีตาร์ อูคูเลเล่ ฟรี | Chord" />
    <meta property="og:description" content="ค้นหาคอร์ดเพลงไทย-สากลกว่า 70,000 เพลง เปลี่ยนคีย์ได้ทันที ใช้ฟรี ไม่ต้องสมัคร" />
    <meta property="og:url" content="https://chord.golfchairat.com/" />
    <meta property="og:image" content="https://chord.golfchairat.com/icon-512.png" />
    <meta property="og:locale" content="th_TH" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="คอร์ดเพลง ค้นหาคอร์ดกีตาร์ อูคูเลเล่ ฟรี | Chord" />
    <meta name="twitter:description" content="ค้นหาคอร์ดเพลงไทย-สากลกว่า 70,000 เพลง เปลี่ยนคีย์ได้ทันที ใช้ฟรี" />
    <meta name="twitter:image" content="https://chord.golfchairat.com/icon-512.png" />
    <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"WebSite","@id":"https://chord.golfchairat.com/#website","url":"https://chord.golfchairat.com/","name":"Chord","description":"ค้นหาคอร์ดเพลงไทยและสากลกว่า 70,000 เพลง เปลี่ยนคีย์ได้ทันที ใช้ฟรี","inLanguage":"th-TH","potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://chord.golfchairat.com/?q={search_term_string}"},"query-input":"required name=search_term_string"}},{"@type":"Organization","@id":"https://chord.golfchairat.com/#org","name":"Chord","url":"https://chord.golfchairat.com/","logo":"https://chord.golfchairat.com/icon-512.png"}]}</script>
    <!-- seo:end -->

    <!-- Kick off the songs payload download in parallel with the JS bundle.
         Without this, fetch("/songs.bin") only starts after main.tsx parses
         + executes + store.init() runs — easily 1-2 s of dead time on a
         cold mobile load. `as=fetch` matches the `fetch()` call in
         songsCodec; crossorigin keeps the response usable by the same
         CORS-mode fetch. -->
    <link rel="preload" href="/songs.bin" as="fetch" crossorigin="anonymous" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <!-- Async Google Fonts: load as `media=print` so the stylesheet is
         non-render-blocking, then flip to `media=all` once it's parsed.
         Saves ~200-600 ms on the first paint over slow networks. The
         <noscript> fallback keeps fonts working when JS is disabled. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Inline boot splash. Paints from the HTML alone — visible before our
         JS bundle has even started parsing. React's createRoot().render()
         replaces #root's contents on first render, so this disappears the
         instant the shell mounts. -->
    <style>
      html, body { background-color: #08070d; }
      body { margin: 0; color: #fff; -webkit-font-smoothing: antialiased; }
      #root { height: 100%; }
      .boot-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; gap: 16px;
        align-items: center; justify-content: center;
        background: #08070d;
        color: rgba(255,255,255,0.85);
        font: 600 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", "IBM Plex Sans Thai", system-ui, sans-serif;
        letter-spacing: -0.005em;
      }
      .boot-splash__mark {
        position: relative;
        width: 64px; height: 64px; border-radius: 18px;
        background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 55%, #f59e0b 100%);
        box-shadow: 0 12px 40px -8px rgba(139, 92, 246, 0.55);
        display: grid; place-items: center;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      .boot-splash__mark::before {
        content: ""; position: absolute; inset: 0; border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent 60%);
        pointer-events: none;
      }
      .boot-splash__title { font-size: 15px; font-weight: 600; }
      .boot-splash__hint { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: -4px; }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.94); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-hidden="true">
        <div class="boot-splash__mark">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="#fff" aria-hidden="true">
            <path d="M9 17V5l12-2v12" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="6" cy="17" r="3" />
            <circle cx="18" cy="15" r="3" />
          </svg>
        </div>
        <div class="boot-splash__title">Chord</div>
        <div class="boot-splash__hint">กำลังเปิดแอป...</div>
      </div>
      <!-- ssr -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
